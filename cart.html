<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>The Food Palace - Shopping Cart</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#ec1313",
            "background-light": "#ffffff",
            "surface-light": "#f8f6f6",
            "background-dark": "#1a0808"
          },
          fontFamily: {
            "display": ["Plus Jakarta Sans", "sans-serif"]
          }
        }
      }
    };
  </script>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body class="bg-background-light font-display text-slate-900 flex flex-col">
  <header class="bg-primary text-white p-4 sticky top-0 z-50 shadow-md">
    <div class="flex items-center justify-between max-w-lg mx-auto">
      <a href="menu.html" class="flex items-center justify-center size-10 -ml-2"><span
          class="material-symbols-outlined">arrow_back_ios_new</span></a>
      <h1 class="text-xl font-bold tracking-tight">Your Cart</h1>
      <div class="size-10"></div>
    </div>
  </header>

  <main class="flex-1 max-w-lg mx-auto w-full px-4 py-6 space-y-8">
    <section class="space-y-4">
      <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400">Order Items</h2>
      <div id="cartItems" class="space-y-4"></div>
    </section>

    <section class="space-y-4">
      <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400">Order Summary</h2>
      <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm space-y-3">
        <div class="flex justify-between text-sm"><span class="text-slate-500">Subtotal</span><span
            class="font-semibold" id="subtotalText">₹0.00</span></div>
        <div class="hidden flex justify-between text-sm"><span class="text-slate-500">Taxes &amp; Fees</span><span
            class="font-semibold" id="taxText">₹0.00</span></div>
        <div class="pt-3 border-t border-dashed border-slate-200 flex justify-between items-center"><span
            class="font-bold text-lg">Total</span><span class="font-black text-2xl text-primary"
            id="totalText">₹0.00</span></div>
      </div>
    </section>

    <section class="space-y-4">
      <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400">Customer Details</h2>
      <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm space-y-4">
        <div class="space-y-1">
          <label for="customerName" class="text-xs font-bold text-slate-500 uppercase">Your Name</label>
          <input type="text" id="customerName"
            class="w-full rounded-xl border-slate-200 focus:border-primary focus:ring-primary text-sm"
            placeholder="e.g. Rahul Sharma" required>
        </div>
        <div class="space-y-1">
          <label for="customerPhone" class="text-xs font-bold text-slate-500 uppercase">Phone Number</label>
          <input type="tel" id="customerPhone"
            class="w-full rounded-xl border-slate-200 focus:border-primary focus:ring-primary text-sm"
            placeholder="e.g. +91 9876543210" required>
        </div>
        <div id="arrivalTimeSection" class="space-y-1">
          <label for="arrivalTime" class="text-xs font-bold text-slate-500 uppercase">Expected Arrival Time</label>
          <input type="time" id="arrivalTime"
            class="w-full rounded-xl border-slate-200 focus:border-primary focus:ring-primary text-sm">
          <p class="text-[10px] text-slate-400 italic">Required only for advance bookings</p>
        </div>
      </div>
    </section>

    <p id="cartError" class="hidden text-sm text-red-600 bg-red-50 px-3 py-2 rounded-lg"></p>
  </main>

  <div class="sticky bottom-0 bg-white/90 backdrop-blur-xl border-t border-slate-100 p-4 pb-8">
    <div class="max-w-lg mx-auto grid grid-cols-1 sm:grid-cols-2 gap-3">
      <button
        class="w-full bg-primary text-white py-4 rounded-2xl font-bold text-lg shadow-xl shadow-primary/20 active:scale-[0.98] transition-transform"
        id="bookAdvanceBtn">Book in Advance</button>
      <button
        class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-lg shadow-xl active:scale-[0.98] transition-transform"
        id="bookStallBtn">Book at Stall</button>
    </div>
  </div>

  <script src="supabase-config.js"></script>
  <script src="order-service.js"></script>
  <script>
    const CONFIG_KEY = "food_palace_shop_config";
    const CART_KEY = "food_palace_cart";

    function money(value) {
      return `₹${value.toFixed(2)}`;
    }

    function getCart() {
      try {
        return JSON.parse(localStorage.getItem(CART_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function saveCart(cart) {
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
    }

    function changeQty(id, delta) {
      const cart = getCart();
      if (!cart[id]) return;
      cart[id].qty += delta;
      if (cart[id].qty <= 0) delete cart[id];
      saveCart(cart);
      render();
    }

    function cartTotals(items) {
      const subtotal = items.reduce((sum, item) => sum + item.price * item.qty, 0);
      const tax = 0;
      const total = subtotal;
      return { subtotal, tax, total };
    }

    function renderItems(cart) {
      const container = document.getElementById("cartItems");
      const items = Object.values(cart);
      if (!items.length) {
        container.innerHTML = '<div class="bg-surface-light p-6 rounded-2xl text-center text-slate-500">Your cart is empty. Add items from the menu.</div>';
        return;
      }

      container.innerHTML = items.map((item) => `
      <div class="flex items-center gap-4 bg-white p-3 rounded-2xl border border-slate-100 shadow-sm">
        <div class="size-20 rounded-xl bg-cover bg-center shrink-0" style="background-image: url('${item.image}')"></div>
        <div class="flex-1 flex flex-col justify-between h-20 py-0.5">
          <div class="flex justify-between items-start">
            <h3 class="font-bold text-base leading-tight">${item.name}</h3>
            <span class="text-primary font-bold">${money(item.price * item.qty)}</span>
          </div>
          <div class="flex items-center justify-between">
            <p class="text-xs text-slate-500">${item.note || "Regular Portion"}</p>
            <div class="flex items-center gap-3 bg-surface-light rounded-full px-2 py-1">
              <button class="size-6 flex items-center justify-center rounded-full bg-white text-primary shadow-sm" data-action="minus" data-id="${item.id}"><span class="material-symbols-outlined text-sm font-bold">remove</span></button>
              <span class="text-sm font-bold w-4 text-center">${item.qty}</span>
              <button class="size-6 flex items-center justify-center rounded-full bg-primary text-white shadow-sm" data-action="plus" data-id="${item.id}"><span class="material-symbols-outlined text-sm font-bold">add</span></button>
            </div>
          </div>
        </div>
      </div>
    `).join("");

      container.querySelectorAll("button[data-action]").forEach((btn) => {
        btn.addEventListener("click", () => {
          changeQty(btn.dataset.id, btn.dataset.action === "plus" ? 1 : -1);
        });
      });
    }

    function renderSummary(cart) {
      const items = Object.values(cart);
      const totals = cartTotals(items);

      document.getElementById("subtotalText").textContent = money(totals.subtotal);
      document.getElementById("taxText").textContent = money(totals.tax);
      document.getElementById("totalText").textContent = money(totals.total);

      const isEmpty = totals.subtotal === 0;
      const config = JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}');
      const isShopOpen = config.isOpen !== false;

      [document.getElementById("bookAdvanceBtn"), document.getElementById("bookStallBtn")].forEach((btn) => {
        btn.disabled = isEmpty || !isShopOpen;
        btn.classList.toggle("opacity-50", isEmpty || !isShopOpen);
        btn.classList.toggle("cursor-not-allowed", isEmpty || !isShopOpen);
        if (!isShopOpen && !isEmpty) {
          btn.innerText = "Shop Closed";
        }
      });
    }

    function showError(message) {
      const el = document.getElementById("cartError");
      el.textContent = message;
      el.classList.remove("hidden");
    }

    function clearError() {
      document.getElementById("cartError").classList.add("hidden");
    }

    async function placeOrder(bookingType) {
      clearError();
      const customerName = document.getElementById("customerName").value.trim();
      const customerPhone = document.getElementById("customerPhone").value.trim();

      if (!customerName || !customerPhone) {
        showError("Please enter your name and phone number to continue.");
        return;
      }

      const cart = getCart();
      const items = Object.values(cart);
      if (!items.length) return;

      const totals = cartTotals(items);
      const buttons = [document.getElementById("bookAdvanceBtn"), document.getElementById("bookStallBtn")];
      buttons.forEach((b) => b.disabled = true);

      try {
        const order = await window.OrderService.createOrder({
          customerName,
          customerPhone,
          bookingType,
          status: bookingType === 'stall' ? 'Pending Approval' : 'Cooking',
          items,
          subtotal: Number(totals.subtotal.toFixed(2)),
          tax: 0,
          total: Number(totals.total.toFixed(2))
        });
        localStorage.removeItem(CART_KEY);
        window.location.href = `tracking.html?order_id=${encodeURIComponent(order.order_id)}`;
      } catch (err) {
        showError("Order could not be placed. Check Supabase config or try again.");
        buttons.forEach((b) => b.disabled = false);
      }
    }

    function render() {
      const cart = getCart();
      renderItems(cart);
      renderSummary(cart);
    }

    async function handleAdvanceBooking() {
      clearError();
      const customerName = document.getElementById("customerName").value.trim();
      const customerPhone = document.getElementById("customerPhone").value.trim();
      const arrivalTime = document.getElementById("arrivalTime").value;
      if (!customerName || !customerPhone || !arrivalTime) {
        showError("Please enter your name, phone, and expected arrival time.");
        return;
      }
      const cart = getCart();
      const items = Object.values(cart);
      if (!items.length) return;
      const totals = cartTotals(items);

      const pendingOrder = {
        customerName,
        customerPhone,
        arrivalTime,
        bookingType: "advance",
        items,
        subtotal: Number(totals.subtotal.toFixed(2)),
        tax: 0,
        total: Number(totals.total.toFixed(2))
      };
      sessionStorage.setItem("pending_order", JSON.stringify(pendingOrder));
      window.location.href = `payment.html?amount=${totals.total}`;
    }

    document.getElementById("bookAdvanceBtn").addEventListener("click", handleAdvanceBooking);
    document.getElementById("bookStallBtn").addEventListener("click", () => placeOrder("stall"));

    render();
  </script>
</body>

</html>
