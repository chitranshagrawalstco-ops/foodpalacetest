<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Order Tracking - The Food Palace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#ec1313",
            "background-light": "#f8f6f6"
          },
          fontFamily: {
            display: ["Plus Jakarta Sans", "sans-serif"]
          }
        }
      }
    };
  </script>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body class="bg-background-light font-display text-slate-900">
  <div class="fixed top-6 left-6 z-50">
    <a href="index.html"
      class="flex items-center justify-center size-12 bg-white rounded-full shadow-lg border border-slate-100 text-primary active:scale-90 transition-transform">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
    </a>
  </div>
  <div class="min-h-screen flex items-center justify-center p-6">
    <main class="w-full max-w-md bg-white rounded-3xl shadow-lg border border-slate-100 p-8 text-center">
      <p class="text-xs font-bold uppercase tracking-[0.18em] text-slate-400">The Food Palace</p>
      <h1 class="text-2xl font-extrabold mt-2">Order Confirmed</h1>
      <p class="text-slate-500 mt-2">Your order number for today is</p>
      <p id="orderNumber" class="text-5xl font-black text-primary mt-4">#-</p>
      <p id="orderDate" class="text-sm text-slate-500 mt-2"></p>

      <section class="mt-7 text-left">
        <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400">Items Ordered</h2>
        <div id="orderedItems" class="mt-3 space-y-2"></div>
        <p id="orderTotals" class="mt-3 text-sm font-semibold text-slate-700"></p>
      </section>

      <div class="mt-8 rounded-2xl bg-primary/10 text-primary px-4 py-4 font-bold">
        Please take a screenshot of this page.
      </div>
    </main>
  </div>

  <script src="supabase-config.js"></script>
  <script src="order-service.js"></script>
  <script>
    function money(value) {
      return `₹${Number(value).toFixed(2)}`;
    }

    function prettyDate(iso) {
      if (!iso) return "";
      const [y, m, d] = iso.split("-").map(Number);
      const dt = new Date(y, m - 1, d);
      return dt.toLocaleDateString(undefined, { year: "numeric", month: "long", day: "numeric" });
    }

    function renderItems(items) {
      const container = document.getElementById("orderedItems");
      if (!items || !items.length) {
        container.innerHTML = '<p class="text-sm text-slate-500">No items found for this order.</p>';
        return;
      }

      container.innerHTML = items.map((item) => {
        const lineTotal = item.line_total ?? (item.price * item.qty);
        return `
        <div class="flex justify-between items-center bg-slate-50 rounded-xl px-3 py-2">
          <div class="text-sm">
            <p class="font-semibold">${item.name}</p>
            <p class="text-slate-500">Qty: ${item.qty}</p>
          </div>
          <p class="font-bold text-primary">${money(lineTotal)}</p>
        </div>
      `;
      }).join("");
    }

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const orderId = params.get("order_id") || "";

      try {
        const order = await window.OrderService.getOrder(orderId);
        if (!order) {
          document.getElementById("orderDate").textContent = "Order details unavailable.";
          renderItems([]);
          return;
        }

        document.getElementById("orderNumber").textContent = `#${order.order_no}`;
        document.getElementById("orderDate").textContent = `Date: ${prettyDate(order.order_date)}`;
        renderItems(order.items);
        document.getElementById("orderTotals").textContent = `Total: ${money(order.total || 0)}`;
      } catch (err) {
        document.getElementById("orderDate").textContent = "Could not load order details.";
        renderItems([]);
      }
    }

    init();
  </script>
</body>

</html>
